version: "3.9"

services:
  registry:
    build:
      context: .
      dockerfile: registry/Dockerfile
    container_name: forge-registry
    restart: unless-stopped
    environment:
      FORGE_DATA_DIR: /data/registry
      MAX_UPLOAD_BYTES: "524288000"
    volumes:
      - registry-data:/data/registry
    networks:
      - forge-internal
      - forge_build_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    container_name: forge-engine
    restart: unless-stopped
    environment:
      FORGE_ENGINE_DATA_DIR: /data/engine
      FORGE_AUTH_DB: /data/registry/auth.db
      FORGE_REGISTRY_URL: http://registry:8001
      FORGE_MAX_CONCURRENCY: "4"
      FORGE_JOB_TIMEOUT: "1800"
      FORGE_BUILD_NETWORK: forge_forge_build_net
      FORGE_SLACK_WEBHOOK: "${FORGE_SLACK_WEBHOOK:-}"
      FORGE_SLACK_ONCALL: "${FORGE_SLACK_ONCALL:-}"
    volumes:
      - engine-data:/data/engine
      - registry-data:/data/registry
      # Engine needs to talk to Docker daemon to spawn job containers
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp # shared tmpfs for workspace dirs
    networks:
      - forge-internal
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    container_name: forge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - forge-internal
    depends_on:
      engine:
        condition: service_healthy
      registry:
        condition: service_healthy

volumes:
  registry-data:
  engine-data:

networks:
  forge-internal:
    driver: bridge
  forge_build_net:
    driver: bridge
    internal: true
    name: forge_build_net
