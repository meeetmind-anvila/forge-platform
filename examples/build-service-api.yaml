name: build-service-api
version: 0.1.0
dependencies:
  - name: lib-core
    version: "^1.0.0"
  - name: lib-http
    version: "^1.0.0"
jobs:
  test:
    runtime: alpine:3.18
    resources: { cpu: 1.0, memory: 512Mi }
    steps:
      - { name: verify-core, run: "test -f deps/lib-core/lib-core-1.0.0.tar.gz" }
      - { name: verify-http, run: "test -f deps/lib-http/lib-http-1.0.0.tar.gz" }
  package:
    needs: [test]
    runtime: alpine:3.18
    resources: { cpu: 1.0, memory: 512Mi }
    steps:
      - { name: prepare, run: "mkdir -p src && echo api > src/api.txt" }
      - { name: package, run: "tar czf out.tar.gz src/" }
artifacts:
  - { name: service-api, version: 0.1.0, path: ./out.tar.gz }
