name: security-probe
version: 0.1.0
jobs:
  filesystem:
    runtime: alpine:3.18
    resources: { cpu: 1.0, memory: 128Mi }
    steps:
      - { name: filesystem-escape, run: "test ! -e /host && touch /workspace/ok-fs" }
  network:
    runtime: alpine:3.18
    resources: { cpu: 1.0, memory: 128Mi }
    steps:
      - { name: deny-public-egress, run: "wget -T 5 -qO- https://example.com && exit 1 || echo public egress blocked" }
  memory:
    runtime: alpine:3.18
    resources: { cpu: 1.0, memory: 64Mi }
    steps:
      - { name: oom-signal, run: "dd if=/dev/zero of=/tmp/fill bs=1M count=256" }
