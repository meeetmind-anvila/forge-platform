name: build-lib-core
version: 1.0.0
jobs:
  build:
    runtime: alpine:3.18
    resources: { cpu: 1.0, memory: 512Mi }
    steps:
      - { name: prepare, run: "mkdir -p src && echo core > src/core.txt" }
      - { name: package, run: "tar czf out.tar.gz src/" }
artifacts:
  - { name: lib-core, version: 1.0.0, path: ./out.tar.gz }
